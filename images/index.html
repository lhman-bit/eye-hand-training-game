<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手眼協調訓練遊戲 - 麵包超人版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black; /* 保持黑色背景 */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: pointer;
            -webkit-touch-callout: none; /* 禁用手機長按選單 */
            -webkit-user-select: none; /* 禁用選取 */
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #target {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* 中央對齊 */
            /* 初始大小，可根據螢幕調整，這裡設為約 3cm */
            width: 120px; 
            height: auto; /* 保持圖片比例 */
            cursor: pointer;
            transition: all 0.3s ease-in-out; /* 平滑放大與移動動畫 */
            z-index: 10;
            -webkit-tap-highlight-color: transparent; /* 禁用行動裝置點擊高亮 */
        }

        /* 麵包超人圖片樣式 */
        #target img {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 跳動動畫提示 (3秒未注視時觸發) */
        @keyframes bounce {
            0%, 100% { transform: translateY(0) translate(-50%, 0); }
            50% { transform: translateY(-30px) translate(-50%, 0); } /* 上下跳動 */
        }
        
        /* 當在角落時，需要保持 translate(-50%, 0) 才能正確顯示跳動 */
        #target.bouncing {
            animation: bounce 0.6s infinite;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="target">
<img src="https://lhman-bit.github.io/eye-hand-training-game/images/breadsuperman.jpg" alt="麵包超人">
        </div>
    </div>

    <script>
        const target = document.getElementById('target');
        let clickCount = 0;
        // 初始物理尺寸 120px，每次變大 1cm (40px)
        let currentSize = 120; 
        const originalSize = 120; // 記錄原始大小供角落移動時回復
        let phase = 'center'; // center, corners
        let cornerIndex = 0;
        let hintTimer;
        let isGazed = false;
        
        // 四個角落的坐標設定 (左上, 右上, 左下, 右下)
        const corners = [
            { top: '30px', left: '30px' }, // 左上
            { top: '30px', right: '30px' }, // 右上
            { bottom: '30px', left: '30px' }, // 左下
            { bottom: '30px', right: '30px' } // 右下
        ];

        // 簡單的音效產生器 (叮一聲)
        function playDing() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(987.77, ctx.currentTime); // B5 頻率
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {
                console.log("音效播放失敗，可能需要使用者互動才能啟用。");
            }
        }

        // 處理點擊/觸碰邏輯 (支援電腦滑鼠與手機觸控)
        function handleInteraction(e) {
            e.preventDefault(); // 防止手機點擊穿透

            if (phase === 'center') {
                clickCount++;
                playDing();
                
                // 每次變大約 1cm (增加 40px)
                currentSize += 40; 
                target.style.width = currentSize + 'px';

                if (clickCount >= 3) {
                    // 點擊滿3次後，延遲一下進入角落階段
                    setTimeout(startCornerPhase, 500);
                }
            }
        }

        // 綁定互動事件
        target.addEventListener('click', handleInteraction); // 電腦滑鼠
        target.addEventListener('touchstart', handleInteraction); // 手機觸控

        // --- 角落移動邏輯 ---

        function startCornerPhase() {
            phase = 'corners';
            cornerIndex = 0;
            // 重要：移動到角落時回復原本的大細
            target.style.width = originalSize + 'px';
            target.style.transform = 'none'; // 移除中央的對齊 transform
            
            // 由於 transform 改變，重新綁定 hover (注視) 事件
            target.removeEventListener('mouseenter', onGazeSim); // 移除舊的
            target.addEventListener('mouseenter', onGazeSim); // 綁定新的

            moveToNextCorner();
        }

        function moveToNextCorner() {
            if (cornerIndex >= corners.length) {
                finishGame();
                return;
            }

            isGazed = false;
            target.classList.remove('bouncing'); // 移除跳動提示
            clearTimeout(hintTimer);

            // 清除之前的坐標設定
            target.style.top = 'auto';
            target.style.bottom = 'auto';
            target.style.left = 'auto';
            target.style.right = 'auto';

            // 應用新位置
            const pos = corners[cornerIndex];
            if (pos.top) target.style.top = pos.top;
            if (pos.bottom) target.style.bottom = pos.bottom;
            if (pos.left) target.style.left = pos.left;
            if (pos.right) target.style.right = pos.right;

            // 啟動 3 秒提示計時 (若未注視)
            hintTimer = setTimeout(() => {
                if (!isGazed) {
                    target.classList.add('bouncing');
                }
            }, 3000);
        }

        // 模擬眼動注視 (滑鼠移入或觸摸)
        function onGazeSim() {
            if (phase === 'corners' && !isGazed) {
                isGazed = true;
                clearTimeout(hintTimer);
                target.classList.remove('bouncing');
                
                // 注視後停頓 2 秒再移動到下一個角落
                setTimeout(() => {
                    cornerIndex++;
                    moveToNextCorner();
                }, 2000);
            }
        }

        function finishGame() {
            target.style.display = 'none';
            playDing(); // 最後叮一聲提示
            setTimeout(() => {
                alert("訓練完成！");
                location.reload(); // 重新整理網頁，重啟遊戲
            }, 500);
        }

    </script>
</body>
</html>
